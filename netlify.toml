[build]
  publish = "."
  command = "npm run verify"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/lib/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, no-cache"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, no-cache"
